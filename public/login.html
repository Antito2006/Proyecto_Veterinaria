<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <title>Login</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #89CFF0;
        }

        .login-box {

            width: 400px;

            background: white;

            margin: 100px auto;

            padding: 30px;

            border-radius: 15px;

            box-shadow: 0 0 20px rgba(0, 0, 0, 0.2);
        }
    </style>

</head>

<body>

    <div class="login-box">

        <h2 class="text-center">

            Administración

        </h2>

        <input type="text" id="usuario" class="form-control mt-3" placeholder="Usuario">

        <input type="password" id="contrasena" class="form-control mt-3" placeholder="Contraseña">

        <button class="btn btn-primary w-100 mt-3" onclick="login()">

            Ingresar

        </button>

    </div>

    <script src="js/login.js"></script>

</body>

</html>
