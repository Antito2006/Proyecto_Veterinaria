<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">

<title>Panel Administración</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
    background:#f5f7fa;
}

</style>

</head>

<body>

<nav class="navbar navbar-dark bg-primary">

<div class="container">

<span class="navbar-brand">

Panel Veterinaria

</span>

</div>

</nav>

<div class="container mt-4">

<div class="row mb-4">

<div class="col-md-3">

<div class="card text-center">

<div class="card-body">

<h5> Mascotas</h5>

<h2 id="totalMascotas">0</h2>

</div>

</div>

</div>

<div class="col-md-3">

<div class="card text-center">

<div class="card-body">

<h5> Vacunación</h5>

<h2 id="totalVacunas">0</h2>

</div>

</div>

</div>

<div class="col-md-3">

<div class="card text-center">

<div class="card-body">

<h5> Controles</h5>

<h2 id="totalControles">0</h2>

</div>

</div>

</div>

<div class="col-md-3">

<div class="card text-center">

<div class="card-body">

<h5> Urgencias</h5>

<h2 id="totalUrgencias">0</h2>

</div>

</div>

</div>

</div>

<div class="card">

<div class="card-body">

<div id="mensaje"></div>

<h3> Registrar Mascota</h3>

<input type="hidden" id="idMascota">

<div class="row">

<div class="col-md-4">

<input
type="text"
id="nombre"
class="form-control mb-2"
placeholder="Nombre">

</div>

<div class="col-md-4">

<input
type="text"
id="raza"
class="form-control mb-2"
placeholder="Raza">

</div>

<div class="col-md-4">

<input
type="number"
id="edad"
class="form-control mb-2"
placeholder="Edad">

</div>

</div>

<div class="row">

<div class="col-md-4">

<input
type="text"
id="dueno"
class="form-control mb-2"
placeholder="Dueño">

</div>

<div class="col-md-4">

<input
type="text"
id="telefono"
class="form-control mb-2"
placeholder="Teléfono">

</div>

<div class="col-md-4">

<input
type="text"
id="motivo"
class="form-control mb-2"
placeholder="Vacunacion / Control General / Urgencia">

</div>

</div>

<button
class="btn btn-success"
onclick="guardarMascota()">

Guardar

</button>

</div>

</div>

<div class="mt-4">

<h3> Lista de Mascotas</h3>

<div id="resultado"></div>

</div>

</div>

<script src="js/mascota.js"></script>

</body>

</html>
